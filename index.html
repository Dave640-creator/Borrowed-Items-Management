<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borrowed Items Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container-fluid py-5">

        <!-- Header -->
        <div class="row mb-4">
            <div class="col-md-12">
                <h1 class="display-4 mb-2">
                    <i class="fas fa-dolly"></i> Borrowed Items Management
                </h1>
                <p class="text-muted">Track all borrowed items and their return status</p>
                <hr>
            </div>
        </div>

        <!-- ADD BORROW RECORD FORM -->
        <div class="row mb-5">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="fas fa-plus-circle"></i> Add Borrow Record</h5>
                    </div>
                    <div class="card-body">
                        <form id="borrowForm" class="row g-3">

                            <div class="col-md-6">
                                <label for="itemName" class="form-label">Item Name</label>
                                <input type="text" class="form-control" id="itemName" maxlength="50"
                                       placeholder="e.g., HDMI Cable, Charger" required>
                                <small class="text-danger d-none" id="itemNameError"></small>
                            </div>

                            <div class="col-md-6">
                                <label for="borrowerName" class="form-label">Borrower Name</label>
                                <input type="text" class="form-control" id="borrowerName" maxlength="50"
                                       placeholder="e.g., Juan Dela Cruz" required>
                                <small class="text-danger d-none" id="borrowerNameError"></small>
                            </div>

                            <div class="col-md-6">
                                <label for="phoneNumber" class="form-label">
                                    Phone Number <span class="text-muted">(optional)</span>
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                    <input type="tel" class="form-control" id="phoneNumber" maxlength="20"
                                           placeholder="e.g., 09171234567">
                                </div>
                                <small class="text-danger d-none" id="phoneNumberError"></small>
                            </div>

                            <div class="col-md-6">
                                <label for="borrowDate" class="form-label">Borrow Date</label>
                                <input type="date" class="form-control" id="borrowDate" required>
                                <small class="text-danger d-none" id="borrowDateError"></small>
                            </div>

                            <div class="col-md-6">
                                <label for="expectedReturnDate" class="form-label">Expected Return Date</label>
                                <input type="date" class="form-control" id="expectedReturnDate" required>
                                <small class="text-danger d-none" id="expectedReturnDateError"></small>
                            </div>

                            <div class="col-12">
                                <button type="submit" class="btn btn-success btn-lg">
                                    <i class="fas fa-plus"></i> Add Record
                                </button>
                                <button type="reset" class="btn btn-secondary btn-lg ms-2">
                                    <i class="fas fa-redo"></i> Reset
                                </button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>

            <!-- Quick Stats -->
            <div class="col-md-4">
                <div class="card mb-3 shadow-sm">
                    <div class="card-body text-center border-bottom">
                        <h6 class="text-muted">Total Borrowed</h6>
                        <h3 class="text-primary" id="totalBorrowed">0</h3>
                    </div>
                </div>
                <div class="card mb-3 shadow-sm">
                    <div class="card-body text-center border-bottom">
                        <h6 class="text-muted">Overdue</h6>
                        <h3 class="text-danger" id="totalOverdue">0</h3>
                    </div>
                </div>
                <div class="card shadow-sm">
                    <div class="card-body text-center">
                        <h6 class="text-muted">Returned</h6>
                        <h3 class="text-success" id="totalReturned">0</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- FILTER & SEARCH -->
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label"><i class="fas fa-filter"></i> Filter Status</label>
                                <div class="btn-group w-100" role="group">
                                    <input type="radio" class="btn-check" name="filterStatus" id="filterAll" value="All" checked>
                                    <label class="btn btn-outline-primary" for="filterAll">All</label>

                                    <input type="radio" class="btn-check" name="filterStatus" id="filterReturned" value="Returned">
                                    <label class="btn btn-outline-success" for="filterReturned">Returned</label>

                                    <input type="radio" class="btn-check" name="filterStatus" id="filterNotReturned" value="Not Returned">
                                    <label class="btn btn-outline-warning" for="filterNotReturned">Not Returned</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label"><i class="fas fa-search"></i> Search</label>
                                <input type="text" class="form-control" id="searchBox"
                                       placeholder="Search by item name or borrower...">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- TABLE -->
        <div class="row">
            <div class="col-md-12">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white">
                        <h5 class="mb-0"><i class="fas fa-table"></i> Borrowed Items List</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0" id="borrowTable">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Item</th>
                                        <th>Borrower</th>
                                        <th>Phone</th>
                                        <th>Borrow Date</th>
                                        <th>Expected Return</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="tableBody">
                                    <tr>
                                        <td colspan="8" class="text-center py-4">
                                            <div class="spinner-border text-primary" role="status">
                                                <span class="visually-hidden">Loading...</span>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <!-- PAGINATION -->
                    <div class="card-footer d-flex justify-content-between align-items-center flex-wrap gap-2"
                         id="paginationFooter" style="display:none!important;">
                        <small class="text-muted" id="paginationInfo">Showing 0 records</small>
                        <nav>
                            <ul class="pagination pagination-sm mb-0" id="paginationControls"></ul>
                        </nav>
                        <div class="d-flex align-items-center gap-2">
                            <label class="form-label mb-0 small">Rows:</label>
                            <select class="form-select form-select-sm" id="limitSelect" style="width:80px;">
                                <option value="10">10</option>
                                <option value="20" selected>20</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- EDIT MODAL -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-edit"></i> Edit Record</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editForm">
                        <input type="hidden" id="editId">

                        <div class="mb-3">
                            <label class="form-label">Borrower Name</label>
                            <input type="text" class="form-control" id="editBorrowerName" maxlength="50" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone Number <span class="text-muted">(optional)</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                <input type="tel" class="form-control" id="editPhoneNumber" maxlength="20"
                                       placeholder="e.g., 09171234567">
                            </div>
                            <small class="text-danger d-none" id="editPhoneError"></small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Expected Return Date</label>
                            <input type="date" class="form-control" id="editExpectedReturnDate" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="editStatus" required>
                                <option value="">-- Select Status --</option>
                                <option value="Borrowed">Borrowed (Not Returned)</option>
                                <option value="Returned">Returned</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="editSubmitBtn">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Container -->
    <div id="alertContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
